<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>图片循环滚动</title>
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .container {
            display: flex; /* 使用弹性盒子排列图片 */
            width: fit-content; /* 容器宽度由内容决定 */
            height: 100vh; /* 高度垂直铺满 */
            position: relative;
        }

        .scroller-img {
            height: 100vh; /* 高度铺满屏幕 */
            width: auto;   /* 宽度根据高度自动等比缩放，不拉伸 */
            display: block;
            flex-shrink: 0; /* 防止图片被挤压 */
            
            animation: roll-horizontal 30s linear infinite;
        }

        @keyframes roll-horizontal {
            0% {
                transform: translateX(0);
            }
            100% {
                /* 关键：位移一个图片的完整宽度 */
                /* 因为两张图一样，移动-100%（即一张图的宽）即可实现无缝 */
                transform: translateX(-100%);
            }
        }
    </style>
</head>
<body>
    <!-- 为了确保在任何宽度屏幕下都能无缝，建议放 3 张或更多，或者确保图片足够宽 -->
